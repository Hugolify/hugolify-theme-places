module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: content
      target: content
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts

params:
  
  # Admin
  admin:
    collections:
      places:
        enable: true
        filter:
          - field: isIndex
            value: false
        icon:
          bootstrap_icons: geo-alt-fill
          iconoir: map-pin
          material_icons: location_on
          material_symbols: location_on
          lucide: map-pin
  
  # Config
  places:
    map: true # Boolean, showing map on places list page

    # Item
    thumbnail:
      desktop: '643x425'
      mobile: '310x205'
      scrollsnap: '240x158'
      sizes: calc(100vw - 3.5rem), calc(50vw - 3.5rem)
    
    # Featured image
    image:
      desktop: '420x'
      sizes: 100vw, calc(100vw - 3.5rem), calc(33vw - 3.5rem)

# Default
permalinks:
  page:
    places: /places/:slug/
